definitions:
  internal_api_cat.CatResponse:
    properties:
      birth_date:
        type: string
      breed:
        type: string
      cat_id:
        type: integer
      created_at:
        type: string
      gallery_photos:
        items:
          $ref: '#/definitions/internal_api_cat.FileMetadata'
        type: array
      habits:
        type: string
      name:
        type: string
      title_photo:
        $ref: '#/definitions/internal_api_cat.FileMetadata'
      user_id:
        type: integer
      weight:
        type: number
    type: object
  internal_api_cat.CreateCatResponse:
    properties:
      cat_id:
        type: string
      gallery_photos:
        items:
          $ref: '#/definitions/internal_api_cat.FileMetadata'
        type: array
      title_photo:
        $ref: '#/definitions/internal_api_cat.FileMetadata'
    type: object
  internal_api_cat.FileMetadata:
    properties:
      height:
        type: integer
      key:
        type: string
      size:
        type: integer
      type:
        type: string
      url:
        type: string
      width:
        type: integer
    type: object
  internal_api_cat.ListCatsResponse:
    properties:
      cats:
        items:
          $ref: '#/definitions/internal_api_cat.CatResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  internal_api_cat.UpdateCatRequest:
    properties:
      birth_date:
        type: string
      breed:
        type: string
      habits:
        type: string
      name:
        type: string
      weight:
        type: number
    type: object
  internal_api_health.HealthResponse:
    properties:
      message:
        type: string
    type: object
  internal_api_post.ListPostsResponse:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      posts:
        items:
          $ref: '#/definitions/internal_api_post.PostResponse'
        type: array
      total:
        type: integer
    type: object
  internal_api_post.PostResponse:
    properties:
      body:
        type: string
      cat_id:
        type: string
      created_at:
        type: string
      photos:
        items:
          $ref: '#/definitions/richmond-api_internal_api_fileutil.FileMetadata'
        type: array
      post_id:
        type: string
      title:
        type: string
      user_id:
        type: integer
    type: object
  internal_api_post.UpdatePostRequest:
    properties:
      body:
        type: string
      title:
        type: string
    type: object
  internal_api_user.CreateRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  internal_api_user.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  internal_api_user.TokenResponse:
    properties:
      token:
        type: string
    type: object
  internal_api_user.UserResponse:
    properties:
      login:
        type: string
    type: object
  richmond-api_internal_api_errors.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  richmond-api_internal_api_fileutil.FileMetadata:
    properties:
      height:
        type: integer
      key:
        type: string
      size:
        type: integer
      type:
        type: string
      url:
        type: string
      width:
        type: integer
    type: object
info:
  contact: {}
  description: Backend for richmond app
  title: richmond-api
  version: 0.1.0
paths:
  /api/v1/cat/{id}:
    delete:
      description: Deletes a cat by ID (auth required, must be owner)
      parameters:
      - description: Cat ID
        in: path
        name: id
        required: true
        type: integer
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a cat
      tags:
      - cat
    get:
      description: Gets a cat with photos by ID
      parameters:
      - description: Cat ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_cat.CatResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      summary: Get a cat by ID
      tags:
      - cat
    put:
      consumes:
      - application/json
      description: Updates a cat by ID (auth required, must be owner)
      parameters:
      - description: Cat ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/internal_api_cat.UpdateCatRequest'
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_cat.CatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a cat
      tags:
      - cat
  /api/v1/cat/all:
    get:
      description: Lists cats with pagination (no auth required)
      parameters:
      - description: Limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_cat.ListCatsResponse'
      summary: List all cats
      tags:
      - cat
  /api/v1/cat/new:
    post:
      consumes:
      - multipart/form-data
      description: Creates a new cat with photos (multipart/form-data)
      parameters:
      - description: JSON cat data
        in: formData
        name: data
        required: true
        type: string
      - collectionFormat: csv
        description: Photo files (first is title photo)
        in: formData
        items:
          type: file
        name: file
        required: true
        type: array
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_cat.CreateCatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new cat
      tags:
      - cat
  /api/v1/file/{key}:
    get:
      description: Downloads a file by key from S3 storage
      parameters:
      - description: File key
        in: path
        name: key
        required: true
        type: string
      - description: Quality (original, thumbnail, or preview)
        enum:
        - original
        - thumbnail
        - preview
        in: query
        name: quality
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      summary: Download a file from S3
      tags:
      - file
  /api/v1/post/{id}:
    delete:
      description: Deletes a post by ID (auth required, must be owner)
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a post
      tags:
      - post
    get:
      description: Gets a post by ID
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_post.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      summary: Get a post by ID
      tags:
      - post
    put:
      consumes:
      - application/json
      description: Updates a post by ID (auth required, must be owner)
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/internal_api_post.UpdatePostRequest'
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_post.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a post
      tags:
      - post
  /api/v1/post/all:
    get:
      description: Lists posts with pagination (no auth required)
      parameters:
      - description: Limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_post.ListPostsResponse'
      summary: List all posts
      tags:
      - post
  /api/v1/post/new:
    post:
      consumes:
      - multipart/form-data
      description: Creates a new post for a cat with photos (multipart/form-data)
      parameters:
      - description: JSON post data
        in: formData
        name: data
        required: true
        type: string
      - collectionFormat: csv
        description: Photo files
        in: formData
        items:
          type: file
        name: file
        required: true
        type: array
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_post.PostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new post
      tags:
      - post
  /api/v1/user:
    get:
      description: Returns user data for authenticated user
      parameters:
      - default: Bearer <Add access token here>
        description: Insert your access token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - user
  /api/v1/user/login:
    post:
      consumes:
      - application/json
      description: Login with credentials, returns auth token
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_user.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      summary: Login
      tags:
      - user
  /api/v1/user/new:
    post:
      consumes:
      - application/json
      description: Creates a new user with hashed password
      parameters:
      - description: User credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_user.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_user.UserResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/richmond-api_internal_api_errors.ErrorResponse'
      summary: Create a new user
      tags:
      - user
  /health:
    get:
      consumes:
      - application/json
      description: Returns health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_health.HealthResponse'
      summary: Health check
      tags:
      - health
swagger: "2.0"
